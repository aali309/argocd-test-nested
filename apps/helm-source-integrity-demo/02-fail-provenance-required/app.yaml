# Expected: Sync fails - "Chart is missing the required provenance (.prov) file"
# (or similar; Bitnami does not publish .prov for this chart)
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: helm-provenance-required-demo
  namespace: argocd-e2e
spec:
  project: helm-provenance-required
  source:
    repoURL: https://charts.bitnami.com/bitnami
    chart: nginx
    targetRevision: "18.0.0"
    helm:
      releaseName: helm-provenance-required
  destination:
    server: https://kubernetes.default.svc
    namespace: helm-integrity-02
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
