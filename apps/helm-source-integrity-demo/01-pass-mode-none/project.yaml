# Policy: mode none → no provenance check. Sync should pass.
# Uses OCI repo to avoid 403 when chart repos block .prov requests over HTTPS.
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: helm-mode-none
  namespace: argocd-e2e
spec:
  description: "Helm source integrity - mode none (no verification)"
  sourceRepos:
    - "*"
  destinations:
    - namespace: "*"
      server: "*"
  sourceIntegrity:
    helm:
      policies:
        - repos:
            - url: "oci://registry-1.docker.io/bitnamicharts/*"
          gpg:
            mode: none
            keys: []
