# Policy: mode none → no provenance check. Sync should pass.
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: helm-mode-none
  namespace: argocd-e2e
spec:
  description: "Helm source integrity - mode none (no verification)"
  sourceRepos:
    - "*"
  destinations:
    - namespace: "*"
      server: "*"
  sourceIntegrity:
    helm:
      policies:
        - repos:
            - url: "https://charts.bitnami.com/*"
          gpg:
            mode: none
            keys: []
