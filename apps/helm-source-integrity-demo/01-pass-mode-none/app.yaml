# Expected: Sync passes (policy mode is none, no provenance required).
# Uses OCI so we avoid 403 from Bitnami HTTPS when .prov is requested.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: helm-mode-none-demo
  namespace: argocd-e2e
spec:
  project: helm-mode-none
  source:
    repoURL: oci://registry-1.docker.io/bitnamicharts/nginx
    path: .
    targetRevision: "18.0.0"
    helm:
      releaseName: helm-mode-none
  destination:
    server: https://kubernetes.default.svc
    namespace: helm-integrity-01
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
