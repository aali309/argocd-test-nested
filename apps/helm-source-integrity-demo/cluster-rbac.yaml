# ClusterRoleBinding for Argo CD application controller (argocd-e2e).
# The controller needs cluster-scoped list/get to sync cluster cache. Without this,
# you get: "networkpolicies.networking.k8s.io is forbidden ... at the cluster scope"
#
# Apply: kubectl apply -f cluster-rbac.yaml
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: argocd-application-controller-argocd-e2e
rules:
- apiGroups: ["*"]
  resources: ["*"]
  verbs: ["*"]
- nonResourceURLs: ["*"]
  verbs: ["*"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: argocd-application-controller-argocd-e2e
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: argocd-application-controller-argocd-e2e
subjects:
- kind: ServiceAccount
  name: argocd-application-controller
  namespace: argocd-e2e
