# Two policies for different repos. App 1 (HTTPS) matches first → pass. App 2 (OCI) matches second → fails (no .prov).
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: helm-non-overlapping
  namespace: argocd-e2e
spec:
  description: "Non-overlapping policies - HTTPS repo vs OCI repo"
  sourceRepos:
    - "*"
  destinations:
    - namespace: "*"
      server: "*"
  sourceIntegrity:
    helm:
      policies:
        - repos:
            - url: "https://charts.bitnami.com/*"
          gpg:
            mode: provenance
            keys:
              - "D56C4FCA57A46444"
        - repos:
            - url: "oci://registry-1.docker.io/bitnamicharts/*"
          gpg:
            mode: provenance
            keys:
              - "D56C4FCA57A46444"
