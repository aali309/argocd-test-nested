# Two policies for different repos; app uses HTTPS Bitnami → only first policy matches → pass.
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: helm-non-overlapping
  namespace: argocd-e2e
spec:
  description: "Non-overlapping policies - HTTPS repo vs OCI repo"
  sourceRepos:
    - "*"
  destinations:
    - namespace: "*"
      server: "*"
  sourceIntegrity:
    helm:
      policies:
        - repos:
            - url: "https://charts.bitnami.com/*"
          gpg:
            mode: none
            keys: []
        - repos:
            - url: "oci://registry-1.docker.io/bitnamicharts/*"
          gpg:
            mode: provenance
            keys:
              - "D56C4FCA57A46444"
