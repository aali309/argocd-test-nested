# Expected: Sync passes (only first policy matches this repo; mode none)
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: helm-non-overlapping-demo
  namespace: argocd-e2e
spec:
  project: helm-non-overlapping
  source:
    repoURL: https://charts.bitnami.com/bitnami
    chart: nginx
    targetRevision: "18.0.0"
    helm:
      releaseName: helm-non-overlapping
  destination:
    server: https://kubernetes.default.svc
    namespace: helm-integrity-03
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
