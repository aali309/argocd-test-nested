apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: child-app-invalid
  namespace: namespace-a
  annotations:
    argocd.argoproj.io/managed-by-url: "hlocalhost:8081" # Intentionally invalid URL scheme (missing http/https)
spec:
  project: default
  source:
    repoURL: https://github.com/aali309/argocd-test-nested.git
    targetRevision: main
    path: apps/child-app
  destination:
    server: https://kubernetes.default.svc
    namespace: namespace-a
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
