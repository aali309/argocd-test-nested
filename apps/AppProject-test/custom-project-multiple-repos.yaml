apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: custom-project-multiple-repos
  namespace: appproject-test
  labels:
    app.kubernetes.io/name: custom-project-multiple-repos
    app.kubernetes.io/part-of: gitops-console-plugin-test
    project-type: custom
spec:
  description: "Custom project with multiple source repositories configured"
  # Multiple source repositories
  sourceRepos:
  - 'https://github.com/aali309/argocd-test-nested.git'
  - 'https://github.com/argoproj/argocd-example-apps.git'
  - 'https://github.com/kubernetes/examples.git'
  destinations:
  - namespace: '*'
    server: '*'
  namespaceResourceWhitelist:
  - group: '*'
    kind: '*'
  clusterResourceWhitelist:
  - group: '*'
    kind: '*'
  roles:
  - name: developer
    description: "Developers can sync and inspect multi-repo applications"
    policies:
    - p, proj:custom-project-multiple-repos:developer, applications, get, custom-project-multiple-repos/*, allow
    - p, proj:custom-project-multiple-repos:developer, applications, sync, custom-project-multiple-repos/*, allow
    - p, proj:custom-project-multiple-repos:developer, repositories, get, *, allow
    groups:
    - developers

