apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: multiple-dest-app-4
  namespace: appproject-test
  labels:
    app.kubernetes.io/name: multiple-dest-app-4
    app.kubernetes.io/part-of: gitops-console-plugin-test
spec:
  project: custom-project-multiple-destinations
  source:
    repoURL: 'https://github.com/argoproj/argocd-example-apps.git'
    targetRevision: HEAD
    path: guestbook
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: development
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true

