apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: custom-project-restricted
  namespace: appproject-test
  labels:
    app.kubernetes.io/name: custom-project-restricted
    app.kubernetes.io/part-of: gitops-console-plugin-test
    project-type: custom
spec:
  description: "Custom project with restricted permissions - specific repo and namespace only"
  # Restricted to specific Git repo
  sourceRepos:
  - 'https://github.com/aali309/argocd-test-nested.git'
  # Restricted to specific namespace
  destinations:
  - namespace: 'appproject-test'
    server: '*'
  namespaceResourceWhitelist:
  - group: 'apps'
    kind: 'Deployment'
  - group: 'apps'
    kind: 'StatefulSet'
  - group: ''
    kind: 'Service'
  clusterResourceWhitelist: []
  roles:
  - name: maintainer
    description: "Manage applications in the restricted namespace only"
    policies:
    - p, proj:custom-project-restricted:maintainer, applications, *, custom-project-restricted/*, allow
    - p, proj:custom-project-restricted:maintainer, logs, get, custom-project-restricted/*, allow
    groups:
    - appproject-maintainers
  - name: readonly
    description: "View applications without sync permission"
    policies:
    - p, proj:custom-project-restricted:readonly, applications, get, custom-project-restricted/*, allow
    groups:
    - appproject-viewers

