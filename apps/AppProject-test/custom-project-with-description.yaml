apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: custom-project-with-description
  namespace: appproject-test
  labels:
    app.kubernetes.io/name: custom-project-with-description
    app.kubernetes.io/part-of: gitops-console-plugin-test
    project-type: custom
spec:
  description: "Custom project for production workloads with comprehensive configuration"
  # Allow manifests to deploy from any Git repos
  sourceRepos:
  - '*'
  # Allow applications to deploy to any namespace
  destinations:
  - namespace: '*'
    server: '*'
  # Allow all namespaced-scoped resources to be created
  namespaceResourceWhitelist:
  - group: '*'
    kind: '*'
  # Allow all cluster-scoped resources to be created
  clusterResourceWhitelist:
  - group: '*'
    kind: '*'
  roles:
  - name: admin
    description: "Production admin with full project access"
    policies:
    - p, proj:custom-project-with-description:admin, applications, *, custom-project-with-description/*, allow
    - p, proj:custom-project-with-description:admin, repositories, *, *, allow
    groups:
    - prod-admins
    - platform-admins
  - name: viewer
    description: "Read-only access for auditors"
    policies:
    - p, proj:custom-project-with-description:viewer, applications, get, custom-project-with-description/*, allow
    groups:
    - auditors

