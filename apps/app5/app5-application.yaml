apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: app5
  namespace: argocd-e2e
  annotations:
    # Per-app compare cadence (~2m). Global alternative: argocd-cm data.timeout.reconciliation (seconds).
    argocd.argoproj.io/refresh: "120"
spec:
  project: default
  source:
    repoURL: 'https://github.com/aali309/argocd-test-nested.git'
    targetRevision: HEAD
    path: apps/app5
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: argocd-e2e
  # Repro (#27344 / #25290): no automated sync — OutOfSync visible once compare sees new Git SHA.
  syncPolicy:
    syncOptions:
    - CreateNamespace=true
