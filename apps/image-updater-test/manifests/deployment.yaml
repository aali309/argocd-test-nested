apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-2
  namespace: image-updater-test
  labels:
    app.kubernetes.io/name: app-2
    app.kubernetes.io/part-of: image-updater-console-test
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: app-2
  template:
    metadata:
      labels:
        app.kubernetes.io/name: app-2
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: nginx
        # Official nginx runs as root on port 80; fails on OpenShift restricted-v2 SCC.
        image: nginxinc/nginx-unprivileged:1.17.0
        ports:
        - containerPort: 8080
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: [ALL]
        resources:
          requests:
            cpu: 10m
            memory: 32Mi
          limits:
            cpu: 100m
            memory: 128Mi
      - name: memcached
        image: memcached:1.6.0
        ports:
        - containerPort: 11211
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: [ALL]
        resources:
          requests:
            cpu: 10m
            memory: 32Mi
          limits:
            cpu: 100m
            memory: 64Mi
