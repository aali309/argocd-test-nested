apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-2
  namespace: image-updater-test
  labels:
    app.kubernetes.io/name: app-2
    app.kubernetes.io/part-of: image-updater-console-test
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: app-2
  template:
    metadata:
      labels:
        app.kubernetes.io/name: app-2
    spec:
      containers:
      - name: nginx
        image: nginx:1.17.0
        ports:
        - containerPort: 80
        resources:
          requests:
            cpu: 10m
            memory: 32Mi
          limits:
            cpu: 100m
            memory: 64Mi
      - name: memcached
        image: memcached:1.6.0
        ports:
        - containerPort: 11211
        resources:
          requests:
            cpu: 10m
            memory: 32Mi
          limits:
            cpu: 100m
            memory: 64Mi
